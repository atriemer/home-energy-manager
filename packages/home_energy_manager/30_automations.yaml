# Home Energy Manager
# Sicherheits- und Steuerungsautomationen

automation:
  - id: hem_einzelakku_entladestopp
    alias: "HEM: Einzelakku-Entladestopp"
    description: >
      Stoppt die physische NEXA-Entladung, sobald mindestens ein
      Akkublock das eingestellte Einzelakku-Minimum erreicht.
      Laden und PV-Überschussaufnahme bleiben möglich.
    mode: restart

    triggers:
      - trigger: state
        entity_id:
          - sensor.hem_batterie_1_ladestand
          - sensor.hem_batterie_2_ladestand
          - input_number.hem_controller_einzelakku_minimum

      - trigger: time_pattern
        minutes: "/1"

    conditions:
      - condition: state
        entity_id: input_boolean.hem_adapter_schreibzugriff
        state: "on"

      - condition: state
        entity_id: binary_sensor.hem_batteriedaten_gultig
        state: "on"

      - condition: template
        value_template: >
          {% set soc_1 =
            states('sensor.hem_batterie_1_ladestand')
          %}
          {% set soc_2 =
            states('sensor.hem_batterie_2_ladestand')
          %}
          {% set minimum =
            states('input_number.hem_controller_einzelakku_minimum')
          %}

          {{
            soc_1 not in ['unknown', 'unavailable', 'none', '']
            and soc_2 not in ['unknown', 'unavailable', 'none', '']
            and minimum not in ['unknown', 'unavailable', 'none', '']
            and
            (
              [soc_1 | float, soc_2 | float] | min
              <= minimum | float
            )
          }}

      - condition: template
        value_template: >
          {{
            states(
              'number.growatt_0hvrc0zr23rt0054_slot_1_power'
            ) not in ['unknown', 'unavailable', 'none', '']
            and
            states(
              'number.growatt_0hvrc0zr23rt0054_slot_1_power'
            ) | float(0) > 0
          }}

    actions:
      - action: number.set_value
        target:
          entity_id: number.growatt_0hvrc0zr23rt0054_slot_1_power
        data:
          value: 0

      - action: logbook.log
        data:
          name: HEM Einzelakku-Schutz
          message: >
            Entladung gestoppt. Kleinster Einzelakku-SOC:
            {{
              [
                states('sensor.hem_batterie_1_ladestand') | float(0),
                states('sensor.hem_batterie_2_ladestand') | float(0)
              ] | min
            }} Prozent; Grenze:
            {{
              states(
                'input_number.hem_controller_einzelakku_minimum'
              )
            }} Prozent.
          entity_id: sensor.hem_speicher_sollleistung
