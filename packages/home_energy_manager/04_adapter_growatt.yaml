# Home Energy Manager
# Growatt-/GroBro-Geräteadapter
#
# Aktueller Entwicklungsstand:
#   sicherheitsverriegelter Schreibbetrieb
#
# Gerätebefehle werden nur bei aktivem Schreibzugriff,
# schreibbereitem Adapter und ohne erkannte Fremdsteuerung gesendet.
#
# Der herstellerunabhängige Controller liefert:
#
#   sensor.hem_entlade_sollleistung
#   sensor.hem_lade_sollleistung
#
# Der Adapter erzeugt daraus intern den für Growatt
# benötigten Gerätesollwert.

input_number:
  hem_adapter_maximale_schrittweite:
    name: HEM Adapter maximale Schrittweite
    icon: mdi:stairs
    unit_of_measurement: W
    min: 25
    max: 500
    step: 25
    initial: 100

  hem_adapter_toleranz:
    name: HEM Adapter Leistungstoleranz
    icon: mdi:plus-minus-variant
    unit_of_measurement: W
    min: 10
    max: 250
    step: 10
    initial: 50

input_boolean:
  hem_adapter_schreibzugriff:
    name: HEM Adapter Schreibzugriff
    icon: mdi:lock
    initial: false

template:
  - binary_sensor:
      - name: "HEM Growatt Adapter bereit"
        unique_id: hem_growatt_adapter_bereit
        icon: mdi:connection
        device_class: connectivity
        state: >
          {{
            is_state('binary_sensor.hem_daten_gultig', 'on')
            and
            states('sensor.hem_entlade_sollleistung')
              not in ['unknown', 'unavailable', 'none', '']
            and
            states('sensor.hem_lade_sollleistung')
              not in ['unknown', 'unavailable', 'none', '']
            and
            states('sensor.hem_aktuelle_speicherleistung')
              not in ['unknown', 'unavailable', 'none', '']
          }}
        attributes:
          daten_gültig: >
            {{ states('binary_sensor.hem_daten_gultig') }}
          entlade_sollleistung: >
            {{ states('sensor.hem_entlade_sollleistung') }}
          lade_sollleistung: >
            {{ states('sensor.hem_lade_sollleistung') }}
          batteriesituation: >
            {{ states('sensor.hem_batteriesituation') }}
          schreibzugriff: >
            {{ states('input_boolean.hem_adapter_schreibzugriff') }}
          betriebsart: >
            {% if is_state('input_boolean.hem_adapter_schreibzugriff', 'on') %}
              Schreibbetrieb freigegeben
            {% else %}
              Beobachtungsbetrieb
            {% endif %}

      - name: "HEM Growatt Adapter Fremdsteuerung aktiv"
        unique_id: hem_growatt_adapter_fremdsteuerung_aktiv
        icon: mdi:account-multiple-alert-outline
        state: >
          {{
            is_state(
              'automation.nexa_2000_hausprioritat_mit_akkuschonung',
              'on'
            )
            or
            is_state(
              'automation.nexa_2000_notladung_aus_netz_bei_akku_reserve',
              'on'
            )
            or
            is_state(
              'automation.nexa_2000_kalibrier_lademodus_start',
              'on'
            )
            or
            is_state(
              'automation.nexa_2000_kalibrier_lademodus_ende_bei_100_prozent',
              'on'
            )
            or
            is_state('input_boolean.nexa_kalibrier_lademodus', 'on')
          }}
        attributes:
          hauspriorität: >
            {{
              states(
                'automation.nexa_2000_hausprioritat_mit_akkuschonung'
              )
            }}
          notladung: >
            {{
              states(
                'automation.nexa_2000_notladung_aus_netz_bei_akku_reserve'
              )
            }}
          kalibrier_lademodus: >
            {{ states('input_boolean.nexa_kalibrier_lademodus') }}
          bedeutung: >
            Mindestens eine vorhandene NEXA-Steuerung könnte gleichzeitig
            mit dem HEM auf das Gerät schreiben


  - sensor:

      - name: "HEM Schreibstatus"
        unique_id: hem_schreibstatus
        icon: mdi:shield-lock-outline
        state: >
          {% if not is_state(
                'input_boolean.hem_adapter_schreibzugriff',
                'on'
              ) %}
            Blockiert: Schreibzugriff deaktiviert
          {% elif not is_state(
                'binary_sensor.hem_daten_gultig',
                'on'
              ) %}
            Blockiert: Daten ungültig
          {% elif not is_state(
                'binary_sensor.hem_growatt_adapter_bereit',
                'on'
              ) %}
            Blockiert: Adapter nicht bereit
          {% elif is_state(
                'binary_sensor.hem_growatt_adapter_fremdsteuerung_aktiv',
                'on'
              ) %}
            Blockiert: Fremdsteuerung aktiv
          {% else %}
            Freigegeben
          {% endif %}
        attributes:
          entlade_sollleistung: >
            {{ states('sensor.hem_entlade_sollleistung') }}
          lade_sollleistung: >
            {{ states('sensor.hem_lade_sollleistung') }}
          daten_gueltig: >
            {{ states('binary_sensor.hem_daten_gultig') }}
          adapter_bereit: >
            {{ states('binary_sensor.hem_growatt_adapter_bereit') }}
          fremdsteuerung: >
            {{ states('binary_sensor.hem_growatt_adapter_fremdsteuerung_aktiv') }}
          schreibzugriff: >
            {{ states('input_boolean.hem_adapter_schreibzugriff') }}


  - binary_sensor:

      - name: "HEM Schreibfreigabe"
        unique_id: hem_schreibfreigabe
        icon: mdi:shield-lock-outline
        state: >
          {{
            is_state('input_boolean.hem_adapter_schreibzugriff','on')
            and
            is_state('binary_sensor.hem_daten_gultig','on')
            and
            is_state('binary_sensor.hem_growatt_adapter_bereit','on')
            and
            is_state(
              'binary_sensor.hem_growatt_adapter_fremdsteuerung_aktiv',
              'off'
            )
          }}

      - name: "HEM Growatt Adapter Schreibbereit"
        unique_id: hem_growatt_adapter_schreibbereit
        icon: mdi:shield-check-outline
        device_class: safety
        state: >
          {{
            is_state(
              'binary_sensor.hem_schreibfreigabe',
              'on'
            )
            and
            states(
              'number.growatt_0hvrc0zr23rt0054_slot_1_power'
            ) not in ['unknown', 'unavailable', 'none', '']
            and
            is_state(
              'switch.growatt_0hvrc0zr23rt0054_slot_1_enabled',
              'on'
            )
          }}
        attributes:
          beobachtungsadapter_bereit: >
            {{ states('binary_sensor.hem_growatt_adapter_bereit') }}
          fremdsteuerung_aktiv: >
            {{
              states(
                'binary_sensor.hem_growatt_adapter_fremdsteuerung_aktiv'
              )
            }}
          slot_1_power: >
            {{
              states(
                'number.growatt_0hvrc0zr23rt0054_slot_1_power'
              )
            }}
          charge_limit: >
            {{
              states(
                'number.growatt_0hvrc0zr23rt0054_charge_limit'
              )
            }}
          discharge_limit: >
            {{
              states(
                'number.growatt_0hvrc0zr23rt0054_discharge_limit'
              )
            }}
          slot_1_enabled: >
            {{
              states(
                'switch.growatt_0hvrc0zr23rt0054_slot_1_enabled'
              )
            }}
          hinweis: >
            Schreibbereit bedeutet nur, dass die technischen Voraussetzungen
            erfüllt sind. Es werden weiterhin keine Befehle gesendet.

      - name: "HEM Growatt Adapter Schreiben erforderlich"
        unique_id: hem_growatt_adapter_schreiben_erforderlich
        icon: mdi:pencil-outline
        state: >
          {% set ziel =
            states('sensor.hem_growatt_adapter_geratesollwert')
          %}
          {% set aktuell =
            states(
              'number.growatt_0hvrc0zr23rt0054_slot_1_power'
            )
          %}

          {{
            ziel not in ['unknown', 'unavailable', 'none', '']
            and
            aktuell not in ['unknown', 'unavailable', 'none', '']
            and
            (ziel | float(0)) != (aktuell | float(0))
          }}
        attributes:
          geraetesollwert: >
            {{ states('sensor.hem_growatt_adapter_geratesollwert') }} W
          aktueller_slotwert: >
            {{
              states(
                'number.growatt_0hvrc0zr23rt0054_slot_1_power'
              )
            }} W
          schreibzugriff: >
            {{ states('input_boolean.hem_adapter_schreibzugriff') }}
          hinweis: >
            Dieser Sensor löst noch keinen Gerätebefehl aus

      - name: "HEM Growatt Adapter Sollwert erreicht"
        unique_id: hem_growatt_adapter_sollwert_erreicht
        icon: mdi:target
        availability: >
          {{
            states('sensor.hem_growatt_adapter_abweichung')
              not in ['unknown', 'unavailable', 'none', '']
          }}
        state: >
          {% set abweichung =
            states('sensor.hem_growatt_adapter_abweichung') | float(0)
          %}
          {% set toleranz =
            states('input_number.hem_adapter_toleranz') | float(50)
          %}
          {{ abweichung | abs <= toleranz }}
        attributes:
          toleranz: >
            {{ states('input_number.hem_adapter_toleranz') }} W

  - sensor:
      - name: "HEM Growatt Adapter Sollleistung"
        unique_id: hem_growatt_adapter_sollleistung
        icon: mdi:battery-sync
        unit_of_measurement: W
        state_class: measurement
        availability: >
          {{
            states('sensor.hem_speicher_sollleistung')
              not in ['unknown', 'unavailable', 'none', '']
          }}
        state: >
          {% set entladen =
            states('sensor.hem_entlade_sollleistung') | float(0)
          %}
          {% set laden =
            states('sensor.hem_lade_sollleistung') | float(0)
          %}

          {{ (entladen - laden) | round(0) }}
        attributes:
          quelle_entladung: sensor.hem_entlade_sollleistung
          quelle_ladung: sensor.hem_lade_sollleistung

      - name: "HEM Growatt Adapter Istleistung"
        unique_id: hem_growatt_adapter_istleistung
        icon: mdi:battery-clock
        unit_of_measurement: W
        state_class: measurement
        availability: >
          {{
            states('sensor.hem_aktuelle_speicherleistung')
              not in ['unknown', 'unavailable', 'none', '']
          }}
        state: >
          {{
            states('sensor.hem_aktuelle_speicherleistung')
              | float(0)
              | round(0)
          }}
        attributes:
          quelle: sensor.hem_aktuelle_speicherleistung
          vorzeichen: >
            positiv Entladung, negativ Ladung

      - name: "HEM Growatt Adapter Abweichung"
        unique_id: hem_growatt_adapter_abweichung
        icon: mdi:delta
        unit_of_measurement: W
        state_class: measurement
        availability: >
          {{
            states('sensor.hem_growatt_adapter_sollleistung')
              not in ['unknown', 'unavailable', 'none', '']
            and
            states('sensor.hem_growatt_adapter_istleistung')
              not in ['unknown', 'unavailable', 'none', '']
          }}
        state: >
          {% set soll =
            states('sensor.hem_growatt_adapter_sollleistung') | float(0)
          %}
          {% set ist =
            states('sensor.hem_growatt_adapter_istleistung') | float(0)
          %}
          {{ (soll - ist) | round(0) }}
        attributes:
          berechnung: Sollleistung minus Istleistung

      - name: "HEM Growatt Adapter Zielmodus"
        unique_id: hem_growatt_adapter_zielmodus
        icon: mdi:cog-transfer
        availability: >
          {{
            states('sensor.hem_growatt_adapter_sollleistung')
              not in ['unknown', 'unavailable', 'none', '']
          }}
        state: >
          {% set soll =
            states('sensor.hem_growatt_adapter_sollleistung') | float(0)
          %}
          {% set toleranz =
            states('input_number.hem_adapter_toleranz') | float(50)
          %}

          {% if soll > toleranz %}
            Entladen
          {% elif soll < -toleranz %}
            Laden
          {% else %}
            Inaktiv
          {% endif %}
        attributes:
          sollleistung: >
            {{ states('sensor.hem_growatt_adapter_sollleistung') }} W

      - name: "HEM Growatt Adapter nächster Leistungsbefehl"
        unique_id: hem_growatt_adapter_naechster_leistungsbefehl
        icon: mdi:step-forward
        unit_of_measurement: W
        state_class: measurement
        availability: >
          {{
            is_state('binary_sensor.hem_growatt_adapter_bereit', 'on')
          }}
        state: >
          {% set soll =
            states('sensor.hem_growatt_adapter_sollleistung') | float(0)
          %}
          {% set ist =
            states('sensor.hem_growatt_adapter_istleistung') | float(0)
          %}
          {% set schritt =
            states(
              'input_number.hem_adapter_maximale_schrittweite'
            ) | float(100)
          %}
          {% set toleranz =
            states('input_number.hem_adapter_toleranz') | float(50)
          %}

          {#
            Beim Wechsel zwischen Laden und Entladen wird zuerst
            ein neutraler Befehl von 0 W vorgesehen.
          #}
          {% if
            (ist < -toleranz and soll > toleranz)
            or
            (ist > toleranz and soll < -toleranz)
          %}
            0
          {% else %}
            {% set differenz = soll - ist %}

            {% if differenz | abs <= toleranz %}
              {{ soll | round(0) }}
            {% elif differenz > 0 %}
              {{ [ist + schritt, soll] | min | round(0) }}
            {% else %}
              {{ [ist - schritt, soll] | max | round(0) }}
            {% endif %}
          {% endif %}
        attributes:
          hinweis: >
            Nur Simulation – dieser Wert wird nicht an den NEXA gesendet
          maximale_schrittweite: >
            {{
              states(
                'input_number.hem_adapter_maximale_schrittweite'
              )
            }} W
          vorzeichenwechsel: >
            {% set soll =
              states('sensor.hem_growatt_adapter_sollleistung')
                | float(0)
            %}
            {% set ist =
              states('sensor.hem_growatt_adapter_istleistung')
                | float(0)
            %}
            {% set toleranz =
              states('input_number.hem_adapter_toleranz') | float(50)
            %}
            {{
              (ist < -toleranz and soll > toleranz)
              or
              (ist > toleranz and soll < -toleranz)
            }}

      - name: "HEM Growatt Adapter Gerätesollwert"
        unique_id: hem_growatt_adapter_geraetesollwert
        default_entity_id: sensor.hem_growatt_adapter_geratesollwert
        icon: mdi:tune-vertical
        unit_of_measurement: W
        state_class: measurement
        availability: >
          {{
            states('sensor.hem_growatt_adapter_sollleistung')
              not in ['unknown', 'unavailable', 'none', '']
            and
            states(
              'number.growatt_0hvrc0zr23rt0054_slot_1_power'
            ) not in ['unknown', 'unavailable', 'none', '']
          }}
        state: >
          {% set soll =
            states('sensor.hem_growatt_adapter_sollleistung') | float(0)
          %}
          {% set aktuell =
            states(
              'number.growatt_0hvrc0zr23rt0054_slot_1_power'
            ) | float(0)
          %}
          {% set schritt =
            states(
              'input_number.hem_adapter_maximale_schrittweite'
            ) | float(100)
          %}
          {% set toleranz =
            states('input_number.hem_adapter_toleranz') | float(50)
          %}
          {% set minimum =
            state_attr(
              'number.growatt_0hvrc0zr23rt0054_slot_1_power',
              'min'
            ) | float(0)
          %}
          {% set maximum =
            state_attr(
              'number.growatt_0hvrc0zr23rt0054_slot_1_power',
              'max'
            ) | float(800)
          %}

          {#
            Growatt slot_1_power bildet nur die Entladeleistung ab.
            Negative HEM-Sollwerte für Netzladung werden später über
            einen getrennten Ladepfad umgesetzt.
          #}
          {% set ziel = [[soll, 0] | max, maximum] | min %}

          {# Schutzabschaltungen müssen sofort auf 0 W schreiben. #}
          {% if ziel <= toleranz %}
            0

          {# Kleine Abweichungen verursachen keinen neuen Schreibbefehl. #}
          {% elif (ziel - aktuell) | abs <= toleranz %}
            {{ aktuell | round(0) }}

          {# Leistung nur um die konfigurierte Schrittweite erhöhen. #}
          {% elif ziel > aktuell %}
            {{ [[aktuell + schritt, ziel] | min, maximum] | min | round(0) }}

          {# Leistung nur um die konfigurierte Schrittweite reduzieren. #}
          {% else %}
            {{ [[aktuell - schritt, ziel] | max, minimum] | max | round(0) }}
          {% endif %}
        attributes:
          hem_sollleistung: >
            {{ states('sensor.hem_growatt_adapter_sollleistung') }} W
          aktueller_slotwert: >
            {{
              states(
                'number.growatt_0hvrc0zr23rt0054_slot_1_power'
              )
            }} W
          geraeteminimum: >
            {{
              state_attr(
                'number.growatt_0hvrc0zr23rt0054_slot_1_power',
                'min'
              )
            }} W
          geraetemaximum: >
            {{
              state_attr(
                'number.growatt_0hvrc0zr23rt0054_slot_1_power',
                'max'
              )
            }} W
          maximale_schrittweite: >
            {{
              states(
                'input_number.hem_adapter_maximale_schrittweite'
              )
            }} W
          toleranz: >
            {{ states('input_number.hem_adapter_toleranz') }} W
          hinweis: >
            Negative HEM-Sollwerte werden in diesem Entladepfad als 0 W
            behandelt. Netzladung folgt als eigener Adaptermodus.

      - name: "HEM Growatt Adapter Aktion"
        unique_id: hem_growatt_adapter_aktion
        icon: mdi:clipboard-play-outline
        availability: >
          {{
            states('sensor.hem_entlade_sollleistung')
              not in ['unknown', 'unavailable', 'none', '']
            and
            states('sensor.hem_lade_sollleistung')
              not in ['unknown', 'unavailable', 'none', '']
            and
            states('sensor.hem_growatt_adapter_istleistung')
              not in ['unknown', 'unavailable', 'none', '']
          }}
        state: >
          {% set bereit =
            is_state('binary_sensor.hem_growatt_adapter_bereit', 'on')
          %}
          {% set entladen =
            states('sensor.hem_entlade_sollleistung') | float(0)
          %}
          {% set laden =
            states('sensor.hem_lade_sollleistung') | float(0)
          %}
          {% set soll = entladen - laden %}
          {% set ist =
            states('sensor.hem_growatt_adapter_istleistung') | float(0)
          %}
          {% set toleranz =
            states('input_number.hem_adapter_toleranz') | float(50)
          %}

          {% if not bereit %}
            Keine Aktion – Adapter nicht bereit
          {% elif ist < -toleranz and entladen > toleranz %}
            Laden stoppen
          {% elif ist > toleranz and laden > toleranz %}
            Entladen stoppen
          {% elif (soll - ist) | abs <= toleranz %}
            Keine Änderung erforderlich
          {% elif soll > ist %}
            Leistung erhöhen
          {% else %}
            Leistung reduzieren
          {% endif %}
        attributes:
          beobachtungsbetrieb: true
          mqtt_befehl: >
            Keiner – Schreibzugriff ist nicht implementiert

      - name: "HEM Growatt Adapter Status"
        unique_id: hem_growatt_adapter_status
        icon: mdi:information-outline
        state: >
          {% if
            is_state('input_boolean.hem_adapter_schreibzugriff', 'on')
          %}
            Schreibzugriff angefordert, aber nicht implementiert
          {% elif
            is_state('binary_sensor.hem_growatt_adapter_bereit', 'on')
          %}
            Beobachtung aktiv
          {% else %}
            Nicht bereit
          {% endif %}
        attributes:
          adapter: Growatt NEXA über GroBro
          steuerung: deaktiviert
          beobachtungsbereit: >
            {{ states('binary_sensor.hem_growatt_adapter_bereit') }}
          schreibbereit: >
            {{ states('binary_sensor.hem_growatt_adapter_schreibbereit') }}
          fremdsteuerung_aktiv: >
            {{
              states(
                'binary_sensor.hem_growatt_adapter_fremdsteuerung_aktiv'
              )
            }}
          mqtt_schreibzugriff: nicht implementiert
          sicherheit: >
            Selbst ein aktivierter Helfer löst aktuell keinen Befehl aus

# Growatt-spezifische Sicherheitsautomationen
# Diese Automationen dürfen direkte Growatt-Entitäten verwenden.

automation:
  - id: hem_einzelakku_entladestopp
    alias: "HEM: Einzelakku-Entladestopp"
    description: >
      Stoppt die physische NEXA-Entladung, sobald mindestens ein
      Akkublock das eingestellte Einzelakku-Minimum erreicht.
      Laden und PV-Überschussaufnahme bleiben möglich.
    mode: restart

    triggers:
      - trigger: state
        entity_id:
          - sensor.hem_batterie_1_ladestand
          - sensor.hem_batterie_2_ladestand
          - input_number.hem_controller_einzelakku_minimum

      - trigger: time_pattern
        minutes: "/1"

    conditions:
      - condition: state
        entity_id: input_boolean.hem_adapter_schreibzugriff
        state: "on"

      - condition: state
        entity_id: binary_sensor.hem_batteriedaten_gultig
        state: "on"

      - condition: template
        value_template: >
          {% set soc_1 =
            states('sensor.hem_batterie_1_ladestand')
          %}
          {% set soc_2 =
            states('sensor.hem_batterie_2_ladestand')
          %}
          {% set minimum =
            states('input_number.hem_controller_einzelakku_minimum')
          %}

          {{
            soc_1 not in ['unknown', 'unavailable', 'none', '']
            and soc_2 not in ['unknown', 'unavailable', 'none', '']
            and minimum not in ['unknown', 'unavailable', 'none', '']
            and
            (
              [soc_1 | float, soc_2 | float] | min
              <= minimum | float
            )
          }}

      - condition: template
        value_template: >
          {{
            states(
              'number.growatt_0hvrc0zr23rt0054_slot_1_power'
            ) not in ['unknown', 'unavailable', 'none', '']
            and
            states(
              'number.growatt_0hvrc0zr23rt0054_slot_1_power'
            ) | float(0) > 0
          }}

    actions:
      - action: number.set_value
        target:
          entity_id: number.growatt_0hvrc0zr23rt0054_slot_1_power
        data:
          value: 0

      - action: logbook.log
        data:
          name: HEM Einzelakku-Schutz
          message: >
            Entladung gestoppt. Kleinster Einzelakku-SOC:
            {{
              [
                states('sensor.hem_batterie_1_ladestand') | float(0),
                states('sensor.hem_batterie_2_ladestand') | float(0)
              ] | min
            }} Prozent; Grenze:
            {{
              states(
                'input_number.hem_controller_einzelakku_minimum'
              )
            }} Prozent.
          entity_id: sensor.hem_speicher_sollleistung
