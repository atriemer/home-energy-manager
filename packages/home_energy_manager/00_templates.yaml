  - binary_sensor:
      - name: "HEM Lokale Datenquelle gültig"
        unique_id: hem_lokale_datenquelle_gueltig
        device_class: connectivity
        state: >
          {% set quellen = [
            states.sensor.growatt_0hvrc0zr23rt0054_charging_power,
            states.sensor.growatt_0hvrc0zr23rt0054_output_power,
            states.sensor.growatt_0hvrc0zr23rt0054_total_household_load
          ] %}

          {% set ns = namespace(aktuell=0) %}

          {% for entity in quellen %}
            {% if entity is defined
                  and entity.state not in
                    ['unknown', 'unavailable', 'none', ''] %}
              {% set alter =
                as_timestamp(now())
                - as_timestamp(
                    entity.last_reported
                    | default(entity.last_updated, true)
                  )
              %}

              {% if alter <= 120 %}
                {% set ns.aktuell = ns.aktuell + 1 %}
              {% endif %}
            {% endif %}
          {% endfor %}

          {{ ns.aktuell >= 2 }}
        attributes:
          prüfung: >
            Mindestens zwei der drei schnellen lokalen Messwerte
            wurden innerhalb von 120 Sekunden gemeldet
          aktuelle_quellen: >
            {% set quellen = [
              states.sensor.growatt_0hvrc0zr23rt0054_charging_power,
              states.sensor.growatt_0hvrc0zr23rt0054_output_power,
              states.sensor.growatt_0hvrc0zr23rt0054_total_household_load
            ] %}

            {% set ns = namespace(aktuell=[]) %}

            {% for entity in quellen %}
              {% if entity is defined
                    and entity.state not in
                      ['unknown', 'unavailable', 'none', ''] %}
                {% set alter =
                  as_timestamp(now())
                  - as_timestamp(
                      entity.last_reported
                      | default(entity.last_updated, true)
                    )
                %}

                {% if alter <= 120 %}
                  {% set ns.aktuell =
                    ns.aktuell + [entity.entity_id]
                  %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {{ ns.aktuell | join(', ') }}

      - name: "HEM Netzleistung gültig"
        unique_id: hem_netzleistung_gueltig
        device_class: connectivity
        state: >
          {% set entity = states.sensor.hem_netzleistung %}

          {% if entity is defined
                and entity.state not in
                  ['unknown', 'unavailable', 'none', ''] %}
            {% set alter =
              as_timestamp(now())
              - as_timestamp(
                  entity.last_reported
                  | default(entity.last_updated, true)
                )
            %}
            {% set wert = entity.state | float %}

            {{
              alter <= 120
              and -30000 <= wert <= 30000
            }}
          {% else %}
            false
          {% endif %}
        attributes:
          prüfung: >
            HEM-Netzleistung vorhanden, plausibel und höchstens
            120 Sekunden alt
          quell_entitaet: "sensor.hem_netzleistung"
          alter_sekunden: >
            {% set entity = states.sensor.hem_netzleistung %}

            {% if entity is defined %}
              {{
                (
                  as_timestamp(now())
                  - as_timestamp(
                      entity.last_reported
                      | default(entity.last_updated, true)
                    )
                ) | round(0)
              }}
            {% else %}
              unknown
            {% endif %}

      - name: "HEM PV-Leistung gültig"
        unique_id: hem_pv_leistung_gueltig
        device_class: connectivity
        state: >
          {% set entity = states.sensor.hem_pv_leistung %}
          {% set kommunikation =
            is_state(
              'binary_sensor.hem_lokale_datenquelle_gultig',
              'on'
            )
          %}

          {{
            kommunikation
            and entity is defined
            and entity.state not in
              ['unknown', 'unavailable', 'none', '']
            and 0 <= entity.state | float <= 5000
          }}
        attributes:
          prüfung: >
            PV-Wert plausibel und lokaler Datenweg aktiv;
            ein unveränderter Nachtwert von 0 W bleibt gültig
          datenquelle: >
            {{
              state_attr(
                'sensor.hem_pv_leistung',
                'datenquelle'
              )
            }}
          pv_leistung: >
            {{ states('sensor.hem_pv_leistung') }}

      - name: "HEM Batteriedaten gültig"
        unique_id: hem_batteriedaten_gueltig
        device_class: connectivity
        state: >
          {% set leistung =
            states.sensor.growatt_0hvrc0zr23rt0054_charging_power
          %}
          {% set gesamt =
            states.sensor.hem_batterieladestand
          %}
          {% set batterie_1 =
            states.sensor.hem_batterie_1_ladestand
          %}
          {% set batterie_2 =
            states.sensor.hem_batterie_2_ladestand
          %}

          {% set leistung_ok =
            leistung is defined
            and leistung.state not in
              ['unknown', 'unavailable', 'none', '']
            and -3000 <= leistung.state | float <= 3000
          %}

          {% set gesamt_ok =
            gesamt is defined
            and gesamt.state not in
              ['unknown', 'unavailable', 'none', '']
            and 0 <= gesamt.state | float <= 100
          %}

          {% set batterie_1_ok =
            batterie_1 is defined
            and batterie_1.state not in
              ['unknown', 'unavailable', 'none', '']
            and 0 <= batterie_1.state | float <= 100
          %}

          {% set batterie_2_ok =
            batterie_2 is defined
            and batterie_2.state not in
              ['unknown', 'unavailable', 'none', '']
            and 0 <= batterie_2.state | float <= 100
          %}

          {{
            leistung_ok
            and gesamt_ok
            and batterie_1_ok
            and batterie_2_ok
          }}
        attributes:
          prüfung: >
            Batterieleistung und Ladestände vorhanden und plausibel;
          gesamt_ladestand: >
            {{ states('sensor.hem_batterieladestand') }}
          batterie_1_ladestand: >
            {{ states('sensor.hem_batterie_1_ladestand') }}
          batterie_2_ladestand: >
            {{ states('sensor.hem_batterie_2_ladestand') }}

      - name: "HEM Temperaturen gültig"
        unique_id: hem_temperaturen_gueltig
        device_class: connectivity
        state: >
          {% set batterie_1 =
            states('sensor.hem_batterie_1_temperatur')
          %}
          {% set batterie_2 =
            states('sensor.hem_batterie_2_temperatur')
          %}

          {% set batterie_1_ok =
            batterie_1 not in
              ['unknown', 'unavailable', 'none', '']
            and -20 <= batterie_1 | float <= 80
          %}

          {% set batterie_2_ok =
            batterie_2 not in
              ['unknown', 'unavailable', 'none', '']
            and -20 <= batterie_2 | float <= 80
          %}

          {{ batterie_1_ok and batterie_2_ok }}
        attributes:
          prüfung: >
            Beide Batterietemperaturen verfügbar und plausibel
            zwischen -20 und 80 Grad Celsius
          batterie_1_temperatur: >
            {{ states('sensor.hem_batterie_1_temperatur') }}
          batterie_2_temperatur: >
            {{ states('sensor.hem_batterie_2_temperatur') }}

      - name: "HEM Daten gültig"
        unique_id: hem_daten_gueltig
        device_class: connectivity
        state: >
          {{
            is_state(
              'binary_sensor.hem_lokale_datenquelle_gultig',
              'on'
            )
            and is_state(
              'binary_sensor.hem_netzleistung_gultig',
              'on'
            )
            and is_state(
              'binary_sensor.hem_batteriedaten_gultig',
              'on'
            )
            and is_state(
              'binary_sensor.hem_temperaturen_gultig',
              'on'
            )
          }}
        attributes:
          lokale_datenquelle: >
            {{
              states(
                'binary_sensor.hem_lokale_datenquelle_gultig'
              )
            }}
          netzleistung: >
            {{
              states(
                'binary_sensor.hem_netzleistung_gultig'
              )
            }}
          pv_leistung: >
            {{
              states(
                'binary_sensor.hem_pv_leistung_gultig'
              )
            }}
          batteriedaten: >
            {{
              states(
                'binary_sensor.hem_batteriedaten_gultig'
              )
            }}
          temperaturen: >
            {{
              states(
                'binary_sensor.hem_temperaturen_gultig'
              )
            }}

  - sensor:
      - name: "HEM Datenquelle"
        unique_id: hem_datenquelle
        icon: mdi:database
        state: >
          {% set quellen = [
            state_attr(
              'sensor.hem_pv_leistung',
              'datenquelle'
            ),
            state_attr(
              'sensor.hem_batterieleistung',
              'datenquelle'
            ),
            state_attr(
              'sensor.hem_batterieladestand',
              'datenquelle'
            ),
            state_attr(
              'sensor.hem_batterie_1_ladestand',
              'datenquelle'
            ),
            state_attr(
              'sensor.hem_batterie_2_ladestand',
              'datenquelle'
            ),
            state_attr(
              'sensor.hem_batterie_1_temperatur',
              'datenquelle'
            ),
            state_attr(
              'sensor.hem_batterie_2_temperatur',
              'datenquelle'
            )
          ] %}

          {% set lokal =
            quellen | select('equalto', 'lokal') | list | count
          %}
          {% set cloud =
            quellen | select('equalto', 'cloud') | list | count
          %}

          {% if lokal > 0 and cloud == 0 %}
            Lokal
          {% elif lokal > 0 and cloud > 0 %}
            Gemischt
          {% elif lokal == 0 and cloud > 0 %}
            Cloud
          {% else %}
            Keine
          {% endif %}
        attributes:
          netzmessung: "HEM Netzleistung"
          pv: >
            {{
              state_attr(
                'sensor.hem_pv_leistung',
                'datenquelle'
              )
            }}
          batterieleistung: >
            {{
              state_attr(
                'sensor.hem_batterieleistung',
                'datenquelle'
              )
            }}
          batterie_2_temperatur: >
            {{
              state_attr(
                'sensor.hem_batterie_2_temperatur',
                'datenquelle'
              )
            }}

      - name: "HEM Datenqualität"
        unique_id: hem_datenqualitaet
        icon: mdi:check-decagram
        state: >
          {% set kommunikation =
            is_state(
              'binary_sensor.hem_lokale_datenquelle_gultig',
              'on'
            )
          %}
          {% set netz =
            is_state(
              'binary_sensor.hem_netzleistung_gultig',
              'on'
            )
          %}
          {% set pv =
            is_state(
              'binary_sensor.hem_pv_leistung_gultig',
              'on'
            )
          %}
          {% set batterie =
            is_state(
              'binary_sensor.hem_batteriedaten_gultig',
              'on'
            )
          %}
          {% set temperatur =
            is_state(
              'binary_sensor.hem_temperaturen_gultig',
              'on'
            )
          %}
          {% set quelle =
            states('sensor.hem_datenquelle')
          %}
          {% set nur_batterie_2_temperatur_cloud =
            state_attr(
              'sensor.hem_batterie_2_temperatur',
              'datenquelle'
            ) == 'cloud'
            and state_attr(
              'sensor.hem_pv_leistung',
              'datenquelle'
            ) == 'lokal'
            and state_attr(
              'sensor.hem_batterieleistung',
              'datenquelle'
            ) == 'lokal'
            and state_attr(
              'sensor.hem_batterieladestand',
              'datenquelle'
            ) == 'lokal'
            and state_attr(
              'sensor.hem_batterie_1_ladestand',
              'datenquelle'
            ) == 'lokal'
            and state_attr(
              'sensor.hem_batterie_2_ladestand',
              'datenquelle'
            ) == 'lokal'
            and state_attr(
              'sensor.hem_batterie_1_temperatur',
              'datenquelle'
            ) == 'lokal'
          %}

          {% if kommunikation and netz and pv
                and batterie and temperatur
                and quelle == 'Lokal' %}
            Optimal
          {% elif kommunikation and netz
                and batterie and temperatur
                and quelle == 'Gemischt' %}
            Gut
          {% elif kommunikation and netz and batterie %}
            Eingeschränkt
          {% else %}
            Fehler
          {% endif %}
        attributes:
          steuerung_zulässig: >
            {{
              is_state(
                'binary_sensor.hem_daten_gultig',
                'on'
              )
            }}

      - name: "HEM Status"
        unique_id: hem_status
        icon: mdi:home-lightning-bolt
        state: >
          {% set kommunikation =
            is_state(
              'binary_sensor.hem_lokale_datenquelle_gultig',
              'on'
            )
          %}
          {% set netz =
            is_state(
              'binary_sensor.hem_netzleistung_gultig',
              'on'
            )
          %}
          {% set batterie =
            is_state(
              'binary_sensor.hem_batteriedaten_gultig',
              'on'
            )
          %}
          {% set temperatur =
            is_state(
              'binary_sensor.hem_temperaturen_gultig',
              'on'
            )
          %}
          {% set pv =
            is_state(
              'binary_sensor.hem_pv_leistung_gultig',
              'on'
            )
          %}
          {% set quelle =
            states('sensor.hem_datenquelle')
          %}
          {% set nur_batterie_2_temperatur_cloud =
            state_attr(
              'sensor.hem_batterie_2_temperatur',
              'datenquelle'
            ) == 'cloud'
            and state_attr(
              'sensor.hem_pv_leistung',
              'datenquelle'
            ) == 'lokal'
            and state_attr(
              'sensor.hem_batterieleistung',
              'datenquelle'
            ) == 'lokal'
            and state_attr(
              'sensor.hem_batterieladestand',
              'datenquelle'
            ) == 'lokal'
            and state_attr(
              'sensor.hem_batterie_1_ladestand',
              'datenquelle'
            ) == 'lokal'
            and state_attr(
              'sensor.hem_batterie_2_ladestand',
              'datenquelle'
            ) == 'lokal'
            and state_attr(
              'sensor.hem_batterie_1_temperatur',
              'datenquelle'
            ) == 'lokal'
          %}

          {% if not kommunikation %}
            Lokale Datenquelle nicht verfügbar
          {% elif not netz %}
            Netzsensor nicht verfügbar
          {% elif not batterie %}
            Batteriedaten nicht verfügbar
          {% elif not temperatur %}
            Temperaturdaten nicht verfügbar
          {% elif not pv %}
            Betrieb ohne gültige PV-Daten
          {% elif quelle == 'Cloud' %}
            Cloud-Fallback
          {% elif quelle == 'Gemischt'
                and nur_batterie_2_temperatur_cloud %}
            Normalbetrieb mit Cloud-Temperatur
          {% elif quelle == 'Gemischt' %}
            Betrieb mit Ersatzdaten
          {% else %}
            Normalbetrieb
          {% endif %}
        attributes:
          datenqualität: >
            {{ states('sensor.hem_datenqualitat') }}
          datenquelle: >
            {{ states('sensor.hem_datenquelle') }}
          steuerung_zulässig: >
            {{
              is_state(
                'binary_sensor.hem_daten_gultig',
                'on'
              )
            }}
