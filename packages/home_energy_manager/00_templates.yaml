template:
  - sensor:
      - name: "HEM Netzleistung"
        unique_id: hem_netzleistung
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >
          {{ states('sensor.shellypro3em_total_active_power')
             not in ['unknown', 'unavailable', 'none', ''] }}
        state: >
          {{ states('sensor.shellypro3em_total_active_power')
             | float | round(1) }}
        attributes:
          datenquelle: "Shelly Pro 3EM"
          quell_entitaet: "sensor.shellypro3em_total_active_power"
          vorzeichen: "positiv Netzbezug, negativ Netzeinspeisung"

      - name: "HEM Provider PV Leistung"
        unique_id: hem_provider_pv_leistung
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >
          {{
            states('sensor.growatt_0hvrc0zr23rt0054_pv_total_power')
              not in ['unknown', 'unavailable', 'none', '']
            or
            states('sensor.nexa2000_0hvrc0zr23rt0054_solar_power')
              not in ['unknown', 'unavailable', 'none', '']
          }}
        state: >
          {% set lokal =
            states('sensor.growatt_0hvrc0zr23rt0054_pv_total_power')
          %}
          {% set cloud =
            states('sensor.nexa2000_0hvrc0zr23rt0054_solar_power')
          %}
          {% set lokal_ok =
            is_state('binary_sensor.hem_lokale_datenquelle_gueltig','on')
          %}

          {% if lokal_ok
                and lokal not in ['unknown', 'unavailable', 'none', ''] %}
            {{ [lokal | float, 0] | max | round(1) }}
          {% elif cloud not in ['unknown', 'unavailable', 'none', ''] %}
            {{ [cloud | float, 0] | max | round(1) }}
          {% elif lokal not in ['unknown', 'unavailable', 'none', ''] %}
            {{ [lokal | float, 0] | max | round(1) }}
          {% endif %}
        attributes:
          datenquelle: >
            {% set lokal_ok =
              is_state('binary_sensor.hem_lokale_datenquelle_gueltig','on')
            %}
            {% if lokal_ok
                  and states('sensor.growatt_0hvrc0zr23rt0054_pv_total_power')
                    not in ['unknown', 'unavailable', 'none', ''] %}
              lokal
            {% elif states('sensor.nexa2000_0hvrc0zr23rt0054_solar_power')
                    not in ['unknown', 'unavailable', 'none', ''] %}
              cloud
            {% elif states('sensor.growatt_0hvrc0zr23rt0054_pv_total_power')
                    not in ['unknown', 'unavailable', 'none', ''] %}
              lokal_fallback
            {% else %}
              keine
            {% endif %}

      - name: "HEM PV Leistung"
        unique_id: hem_pv_leistung
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >
          {{
            states('sensor.hem_provider_pv_leistung')
              not in ['unknown', 'unavailable', 'none', '']
          }}
        state: >
          {{ states('sensor.hem_provider_pv_leistung') }}
        attributes:
          datenquelle: >
            {{ state_attr('sensor.hem_provider_pv_leistung','datenquelle') }}
          umfang: "PV-Leistung aus HEM Provider"

      - name: "HEM Systemleistung"
        unique_id: hem_systemleistung
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >
          {{ states('sensor.growatt_0hvrc0zr23rt0054_total_household_load')
             not in ['unknown', 'unavailable', 'none', ''] }}
        state: >
          {{ states('sensor.growatt_0hvrc0zr23rt0054_total_household_load')
             | float | round(1) }}
        attributes:
          datenquelle: "lokal"
          quell_entitaet: "sensor.growatt_0hvrc0zr23rt0054_total_household_load"
          vorzeichen: "positiv Abgabe, negativ Aufnahme"
          hinweis: "Herstellerbezeichnung Total Household Load ist irreführend"

      - name: "HEM Ausgangsleistung"
        unique_id: hem_ausgangsleistung
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >
          {{ states('sensor.hem_systemleistung')
             not in ['unknown', 'unavailable', 'none', ''] }}
        state: >
          {% set leistung = states('sensor.hem_systemleistung') | float %}
          {{ [leistung, 0] | max | round(1) }}
        attributes:
          datenquelle: "berechnet"
          quell_entitaet: "sensor.hem_systemleistung"
          vorzeichen: "positiv Abgabe"
          berechnung: "Positive HEM Systemleistung"

      - name: "HEM Aufnahmeleistung"
        unique_id: hem_aufnahmeleistung
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >
          {{ states('sensor.hem_systemleistung')
             not in ['unknown', 'unavailable', 'none', ''] }}
        state: >
          {% set leistung = states('sensor.hem_systemleistung') | float %}
          {% set aufnahme = [leistung * -1, 0] | max %}
          {{ 0 if aufnahme | abs < 0.05 else aufnahme | round(1) }}
        attributes:
          datenquelle: "berechnet"
          quell_entitaet: "sensor.hem_systemleistung"
          vorzeichen: "positiv Aufnahme"
          berechnung: "Betrag der negativen HEM Systemleistung"

      - name: "HEM Provider Batterieleistung"
        unique_id: hem_provider_batterieleistung
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >
          {{
            states('sensor.growatt_0hvrc0zr23rt0054_charging_power')
              not in ['unknown', 'unavailable', 'none', '']
            or
            states('sensor.nexa2000_0hvrc0zr23rt0054_charging_power')
              not in ['unknown', 'unavailable', 'none', '']
            or
            states('sensor.nexa2000_0hvrc0zr23rt0054_discharge_power')
              not in ['unknown', 'unavailable', 'none', '']
          }}
        state: >
          {% set lokal =
            states('sensor.growatt_0hvrc0zr23rt0054_charging_power')
          %}
          {% set laden =
            states('sensor.nexa2000_0hvrc0zr23rt0054_charging_power')
          %}
          {% set entladen =
            states('sensor.nexa2000_0hvrc0zr23rt0054_discharge_power')
          %}
          {% set lokal_ok =
            is_state('binary_sensor.hem_lokale_datenquelle_gueltig','on')
          %}

          {% if lokal_ok
                and lokal not in ['unknown', 'unavailable', 'none', ''] %}
            {% set leistung = lokal | float * -1 %}
            {{ 0 if leistung | abs < 0.05 else leistung | round(1) }}
          {% elif laden not in ['unknown', 'unavailable', 'none', '']
                and entladen not in ['unknown', 'unavailable', 'none', ''] %}
            {% set leistung = (entladen | float) - (laden | float) %}
            {{ 0 if leistung | abs < 0.05 else leistung | round(1) }}
          {% elif lokal not in ['unknown', 'unavailable', 'none', ''] %}
            {% set leistung = lokal | float * -1 %}
            {{ 0 if leistung | abs < 0.05 else leistung | round(1) }}
          {% endif %}
        attributes:
          datenquelle: >
            {% set lokal_ok =
              is_state('binary_sensor.hem_lokale_datenquelle_gueltig','on')
            %}
            {% if lokal_ok
                  and states('sensor.growatt_0hvrc0zr23rt0054_charging_power')
                    not in ['unknown', 'unavailable', 'none', ''] %}
              lokal
            {% elif states('sensor.nexa2000_0hvrc0zr23rt0054_charging_power')
                    not in ['unknown', 'unavailable', 'none', '']
                  and states('sensor.nexa2000_0hvrc0zr23rt0054_discharge_power')
                    not in ['unknown', 'unavailable', 'none', ''] %}
              cloud
            {% elif states('sensor.growatt_0hvrc0zr23rt0054_charging_power')
                    not in ['unknown', 'unavailable', 'none', ''] %}
              lokal_fallback
            {% else %}
              keine
            {% endif %}
          vorzeichen: "positiv Entladung, negativ Ladung"
          status: "Vorzeichen im Beobachtungsbetrieb weiter prüfen"


