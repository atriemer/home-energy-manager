################################################################################
#
# Home Energy Manager (HEM)
#
# Data Provider Layer
#
# Aufgabe:
#   Beschafft Rohdaten aus lokalen Geräten oder Cloudquellen.
#
# Priorität:
#   1. Lokale Daten
#   2. Cloud
#   3. Lokaler Notfallback
#
# Öffentliche Sensoren verwenden ausschließlich:
#
#   sensor.hem_provider_...
#
################################################################################

template:
  - sensor:
      - name: "HEM Provider PV Leistung"
        unique_id: hem_provider_pv_leistung
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >
          {{
            states('sensor.growatt_0hvrc0zr23rt0054_pv_total_power')
              not in ['unknown', 'unavailable', 'none', '']
            or
            states('sensor.nexa2000_0hvrc0zr23rt0054_solar_power')
              not in ['unknown', 'unavailable', 'none', '']
          }}
        state: >
          {% set lokal =
            states('sensor.growatt_0hvrc0zr23rt0054_pv_total_power')
          %}
          {% set cloud =
            states('sensor.nexa2000_0hvrc0zr23rt0054_solar_power')
          %}
          {% set lokal_ok =
            is_state('binary_sensor.hem_lokale_datenquelle_gultig','on')
          %}

          {% if lokal_ok
                and lokal not in ['unknown', 'unavailable', 'none', ''] %}
            {{ [lokal | float, 0] | max | round(1) }}
          {% elif cloud not in ['unknown', 'unavailable', 'none', ''] %}
            {{ [cloud | float, 0] | max | round(1) }}
          {% elif lokal not in ['unknown', 'unavailable', 'none', ''] %}
            {{ [lokal | float, 0] | max | round(1) }}
          {% endif %}
        attributes:
          provider_schema: "1"
          lokale_quelle: "sensor.growatt_0hvrc0zr23rt0054_pv_total_power"
          cloud_quelle: "sensor.nexa2000_0hvrc0zr23rt0054_solar_power"
          auswahlstrategie: "lokal > cloud > lokal_fallback"
          datenquelle: >
            {% set lokal_ok =
              is_state('binary_sensor.hem_lokale_datenquelle_gultig','on')
            %}
            {% if lokal_ok
                  and states('sensor.growatt_0hvrc0zr23rt0054_pv_total_power')
                    not in ['unknown', 'unavailable', 'none', ''] %}
              lokal
            {% elif states('sensor.nexa2000_0hvrc0zr23rt0054_solar_power')
                    not in ['unknown', 'unavailable', 'none', ''] %}
              cloud
            {% elif states('sensor.growatt_0hvrc0zr23rt0054_pv_total_power')
                    not in ['unknown', 'unavailable', 'none', ''] %}
              lokal_fallback
            {% else %}
              keine
            {% endif %}

      - name: "HEM Provider Batterieleistung"
        unique_id: hem_provider_batterieleistung
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: >
          {{
            states('sensor.growatt_0hvrc0zr23rt0054_charging_power')
              not in ['unknown', 'unavailable', 'none', '']
            or
            states('sensor.nexa2000_0hvrc0zr23rt0054_charging_power')
              not in ['unknown', 'unavailable', 'none', '']
            or
            states('sensor.nexa2000_0hvrc0zr23rt0054_discharge_power')
              not in ['unknown', 'unavailable', 'none', '']
          }}
        state: >
          {% set lokal =
            states('sensor.growatt_0hvrc0zr23rt0054_charging_power')
          %}
          {% set laden =
            states('sensor.nexa2000_0hvrc0zr23rt0054_charging_power')
          %}
          {% set entladen =
            states('sensor.nexa2000_0hvrc0zr23rt0054_discharge_power')
          %}
          {% set lokal_ok =
            is_state('binary_sensor.hem_lokale_datenquelle_gultig','on')
          %}

          {% if lokal_ok
                and lokal not in ['unknown', 'unavailable', 'none', ''] %}
            {% set leistung = lokal | float * -1 %}
            {{ 0 if leistung | abs < 0.05 else leistung | round(1) }}
          {% elif laden not in ['unknown', 'unavailable', 'none', '']
                and entladen not in ['unknown', 'unavailable', 'none', ''] %}
            {% set leistung = (entladen | float) - (laden | float) %}
            {{ 0 if leistung | abs < 0.05 else leistung | round(1) }}
          {% elif lokal not in ['unknown', 'unavailable', 'none', ''] %}
            {% set leistung = lokal | float * -1 %}
            {{ 0 if leistung | abs < 0.05 else leistung | round(1) }}
          {% endif %}
        attributes:
          provider_schema: "1"
          lokale_quelle: "sensor.growatt_0hvrc0zr23rt0054_charging_power"
          cloud_quelle: "sensor.nexa2000_0hvrc0zr23rt0054_charging_power + sensor.nexa2000_0hvrc0zr23rt0054_discharge_power"
          auswahlstrategie: "lokal > cloud > lokal_fallback"
          datenquelle: >
            {% set lokal_ok =
              is_state('binary_sensor.hem_lokale_datenquelle_gultig','on')
            %}
            {% if lokal_ok
                  and states('sensor.growatt_0hvrc0zr23rt0054_charging_power')
                    not in ['unknown', 'unavailable', 'none', ''] %}
              lokal
            {% elif states('sensor.nexa2000_0hvrc0zr23rt0054_charging_power')
                    not in ['unknown', 'unavailable', 'none', '']
                  and states('sensor.nexa2000_0hvrc0zr23rt0054_discharge_power')
                    not in ['unknown', 'unavailable', 'none', ''] %}
              cloud
            {% elif states('sensor.growatt_0hvrc0zr23rt0054_charging_power')
                    not in ['unknown', 'unavailable', 'none', ''] %}
              lokal_fallback
            {% else %}
              keine
            {% endif %}
          vorzeichen: "positiv Entladung, negativ Ladung"
          status: "Vorzeichen im Beobachtungsbetrieb weiter prüfen"

