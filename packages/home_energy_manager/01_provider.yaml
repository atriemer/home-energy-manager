            or
            states('sensor.nexa2000_0hvrc0zr23rt0054_soc')
              not in ['unknown', 'unavailable', 'none', '']
          }}
        state: >
          {% set lokal =
            states('sensor.growatt_0hvrc0zr23rt0054_total_battery_soc')
          %}
          {% set cloud =
            states('sensor.nexa2000_0hvrc0zr23rt0054_soc')
          %}
          {% set lokal_ok =
            is_state('binary_sensor.hem_lokale_datenquelle_gultig', 'on')
          %}

          {% if lokal_ok
                and lokal not in ['unknown', 'unavailable', 'none', '']
                and 0 <= lokal | float <= 100 %}
            {{ lokal | float | round(1) }}
          {% elif cloud not in ['unknown', 'unavailable', 'none', '']
                and 0 <= cloud | float <= 100 %}
            {{ cloud | float | round(1) }}
          {% elif lokal not in ['unknown', 'unavailable', 'none', '']
                and 0 <= lokal | float <= 100 %}
            {{ lokal | float | round(1) }}
