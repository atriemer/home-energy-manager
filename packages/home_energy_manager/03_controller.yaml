# HEM – Controller V1
#
# Zentrale Aufgabe:
# Berechnung der empfohlenen Speicherleistung am Netzanschlusspunkt.
#
# Konvention:
#   positiv  = Speicher soll entladen
#   negativ  = Speicher soll laden
#   0 W      = Speicher soll weder laden noch entladen
#
# Diese Datei ist rein beobachtend.
# Sie führt keine Gerätebefehle aus.
#
# Der NEXA-Adapter wird später getrennt implementiert.

input_boolean:
  hem_controller_aktiv:
    name: HEM Controller aktiv
    icon: mdi:tune-variant
    initial: false

  hem_manueller_betrieb:
    name: HEM Manueller Betrieb
    icon: mdi:hand-back-right
    initial: true

input_number:
  hem_controller_maximale_abgabe:
    name: HEM Maximale Speicherabgabe
    icon: mdi:battery-arrow-down
    unit_of_measurement: W
    min: 100
    max: 1000
    step: 25
    initial: 800

  hem_controller_minimale_abgabe:
    name: HEM Minimale Speicherabgabe
    icon: mdi:battery-low
    unit_of_measurement: W
    min: 0
    max: 300
    step: 25
    initial: 100

  hem_controller_maximale_ladeleistung:
    name: HEM Maximale Speicherladeleistung
    icon: mdi:battery-arrow-up
    unit_of_measurement: W
    min: 100
    max: 1000
    step: 25
    initial: 700

  hem_controller_netz_sollwert:
    name: HEM Netz-Sollwert
    icon: mdi:transmission-tower
    unit_of_measurement: W
    min: 0
    max: 200
    step: 5
    initial: 25

  hem_controller_netz_totband:
    name: HEM Netz-Totband
    icon: mdi:sine-wave
    unit_of_measurement: W
    min: 10
    max: 300
    step: 10
    initial: 60

  hem_controller_einzelakku_minimum:
    name: HEM Einzelakku Mindest-SOC
    icon: mdi:battery-alert
    unit_of_measurement: "%"
    min: 3
    max: 30
    step: 1
    initial: 10

  hem_controller_soc_delta_start:
    name: HEM SOC-Differenz Drosselung Start
    icon: mdi:scale-balance
    unit_of_measurement: "%"
    min: 1
    max: 20
    step: 1
    initial: 5

  hem_controller_soc_delta_stark:
    name: HEM SOC-Differenz starke Drosselung
    icon: mdi:scale-unbalanced
    unit_of_measurement: "%"
    min: 2
    max: 40
    step: 1
    initial: 15

  hem_controller_temperatur_delta_start:
    name: HEM Temperaturdifferenz Drosselung Start
    icon: mdi:thermometer-lines
    unit_of_measurement: "°C"
    min: 1
    max: 15
    step: 0.5
    initial: 3

  hem_controller_temperatur_delta_stark:
    name: HEM Temperaturdifferenz starke Drosselung
    icon: mdi:thermometer-alert
    unit_of_measurement: "°C"
    min: 2
    max: 25
    step: 0.5
    initial: 10

  hem_controller_temperatur_maximum:
    name: HEM Batterietemperatur Maximum
    icon: mdi:thermometer-high
    unit_of_measurement: "°C"
    min: 30
    max: 65
    step: 1
    initial: 50

template:
  - sensor:
      - name: "HEM Aktuelle Speicherleistung"
        unique_id: hem_aktuelle_speicherleistung
        icon: mdi:battery-sync-outline
        unit_of_measurement: W
        state_class: measurement
        availability: >
          {{
            states('sensor.hem_batterieleistung')
              not in ['unknown', 'unavailable', 'none', '']
          }}
        state: >
          {#
            HEM-Konvention:
            positiv = Entladung
            negativ = Ladung
          #}
          {{
            states('sensor.hem_batterieleistung')
              | float(0)
              | round(0)
          }}
        attributes:
          vorzeichen: >
            positiv Entladung, negativ Ladung

      - name: "HEM Schonende Leistungsgrenze"
        unique_id: hem_schonende_leistungsgrenze
        icon: mdi:battery-heart-variant
        unit_of_measurement: W
        state_class: measurement
        availability: >
          {{
            states('sensor.hem_soc_differenz')
              not in ['unknown', 'unavailable', 'none', '']
            and
            states('sensor.hem_temperaturdifferenz')
              not in ['unknown', 'unavailable', 'none', '']
          }}
        state: >
          {% set maximum =
            states(
              'input_number.hem_controller_maximale_abgabe'
            ) | float(800)
          %}
          {% set minimum =
            states(
              'input_number.hem_controller_minimale_abgabe'
            ) | float(100)
          %}

          {% set soc_1 =
            states('sensor.hem_batterie_1_ladestand') | float(0)
          %}
          {% set soc_2 =
            states('sensor.hem_batterie_2_ladestand') | float(0)
          %}
          {% set soc_min = [soc_1, soc_2] | min %}
          {% set soc_minimum =
            states(
              'input_number.hem_controller_einzelakku_minimum'
            ) | float(10)
          %}

          {% set soc_delta =
            states('sensor.hem_soc_differenz')
              | float(0)
          %}
          {% set soc_start =
            states(
              'input_number.hem_controller_soc_delta_start'
            ) | float(5)
          %}
          {% set soc_stark =
            states(
              'input_number.hem_controller_soc_delta_stark'
            ) | float(15)
          %}

          {% set temperatur_1 =
            states('sensor.hem_batterie_1_temperatur') | float(0)
          %}
          {% set temperatur_2 =
            states('sensor.hem_batterie_2_temperatur') | float(0)
          %}
          {% set temperatur_max =
            [temperatur_1, temperatur_2] | max
          %}
          {% set temperatur_hart =
            states(
              'input_number.hem_controller_temperatur_maximum'
            ) | float(50)
          %}

          {% set temperatur_delta =
            states('sensor.hem_temperaturdifferenz')
              | float(0)
          %}
          {% set temperatur_start =
            states(
              'input_number.hem_controller_temperatur_delta_start'
            ) | float(3)
          %}
          {% set temperatur_stark =
            states(
              'input_number.hem_controller_temperatur_delta_stark'
            ) | float(10)
          %}

          {% if soc_min <= soc_minimum %}
            {% set einzelakku_limit = 0 %}
          {% elif soc_min >= (soc_minimum + 20) %}
            {% set einzelakku_limit = maximum %}
          {% else %}
            {% set anteil =
              (soc_min - soc_minimum) / 20
            %}
            {% set einzelakku_limit =
              minimum + anteil * (maximum - minimum)
            %}
          {% endif %}

          {% if soc_delta <= soc_start %}
            {% set soc_limit = maximum %}
          {% elif soc_delta >= soc_stark %}
            {% set soc_limit = minimum %}
          {% else %}
            {% set anteil =
              (soc_delta - soc_start)
              / (soc_stark - soc_start)
            %}
            {% set soc_limit =
              maximum - anteil * (maximum - minimum)
            %}
          {% endif %}

          {% if temperatur_max >= temperatur_hart %}
            {% set temperatur_limit = 0 %}
          {% elif temperatur_delta <= temperatur_start %}
            {% set temperatur_limit = maximum %}
          {% elif temperatur_delta >= temperatur_stark %}
            {% set temperatur_limit = minimum %}
          {% else %}
            {% set anteil =
              (temperatur_delta - temperatur_start)
              / (temperatur_stark - temperatur_start)
            %}
            {% set temperatur_limit =
              maximum - anteil * (maximum - minimum)
            %}
          {% endif %}

          {{
            [
              einzelakku_limit,
              soc_limit,
              temperatur_limit,
              maximum
            ] | min | round(0)
          }}
        attributes:
          grenze_einzelakku: >
            {% set maximum =
              states(
                'input_number.hem_controller_maximale_abgabe'
              ) | float(800)
            %}
            {% set minimum =
              states(
                'input_number.hem_controller_minimale_abgabe'
              ) | float(100)
            %}
            {% set grenze =
              states(
                'input_number.hem_controller_einzelakku_minimum'
              ) | float(10)
            %}
            {% set soc =
              [
                states('sensor.hem_batterie_1_ladestand')
                  | float(0),
                states('sensor.hem_batterie_2_ladestand')
                  | float(0)
              ] | min
            %}
            {% if soc <= grenze %}
              0
            {% elif soc >= (grenze + 20) %}
              {{ maximum | round(0) }}
            {% else %}
              {{
                (
                  minimum
                  + (
                      (soc - grenze) / 20
                      * (maximum - minimum)
                    )
                ) | round(0)
              }}
            {% endif %}
          soc_differenz: >
            {{ states('sensor.hem_soc_differenz') }}
          temperaturdifferenz: >
            {{
              states(
                'sensor.hem_temperaturdifferenz'
              )
            }}

      - name: "HEM Ungedrosselte Sollleistung"
        unique_id: hem_ungedrosselte_sollleistung
        icon: mdi:calculator-variant-outline
        unit_of_measurement: W
        state_class: measurement
        availability: >
          {{
            states('sensor.hem_netzleistung')
              not in ['unknown', 'unavailable', 'none', '']
          }}
        state: >
          {% set netz =
            states('sensor.hem_netzleistung') | float(0)
          %}
          {% set maximale_entladung =
            states(
              'input_number.hem_controller_maximale_abgabe'
            ) | float(800)
          %}
          {% set maximale_ladung =
            states(
              'input_number.hem_controller_maximale_ladeleistung'
            ) | float(700)
          %}
          {% set sollwert =
            states(
              'input_number.hem_controller_netz_sollwert'
            ) | float(25)
          %}
          {% set totband =
            states(
              'input_number.hem_controller_netz_totband'
            ) | float(60)
          %}

          {#
            Netzleistung:
              positiv = Netzbezug
              negativ = Netzeinspeisung

            Speicher-Sollleistung:
              positiv = Entladung
              negativ = Ladung

            Der Controller berechnet sein Ziel ausschließlich aus
            Netzleistung und Netz-Sollwert. Die aktuelle Leistung des
            angeschlossenen Speichers wird hier nicht berücksichtigt.
          #}

          {% set ziel = netz - sollwert %}

          {% if ziel | abs <= totband %}
            0
          {% else %}
            {{
              [
                [ziel, -maximale_ladung] | max,
                maximale_entladung
              ] | min | round(0)
            }}
          {% endif %}
        attributes:
          netzleistung: >
            {{ states('sensor.hem_netzleistung') }}
          netz_sollwert: >
            {{
              states(
                'input_number.hem_controller_netz_sollwert'
              )
            }}
          maximale_ladeleistung: >
            {{
              states(
                'input_number.hem_controller_maximale_ladeleistung'
              )
            }}
          erklärung: >
            Sollwert ausschließlich aus Netzfluss berechnet.
            Keine Berücksichtigung der aktuellen Speicherleistung.

      - name: "HEM Speicher-Sollleistung"
        unique_id: hem_speicher_sollleistung
        icon: mdi:battery-sync-outline
        unit_of_measurement: W
        state_class: measurement
        availability: >
          {{
            is_state(
              'binary_sensor.hem_netzleistung_gultig',
              'on'
            )
            and
            is_state(
              'binary_sensor.hem_batteriedaten_gultig',
              'on'
            )
            and
            is_state(
              'binary_sensor.hem_temperaturen_gultig',
              'on'
            )
          }}
        state: >
          {% set ungeregelt =
            states('sensor.hem_ungedrosselte_sollleistung')
              | float(0)
          %}
          {% set schonend =
            states('sensor.hem_schonende_leistungsgrenze')
              | float(0)
          %}
          {% set maximum =
            states(
              'input_number.hem_controller_maximale_abgabe'
            ) | float(800)
          %}
          {% set soc_1 =
            states('sensor.hem_batterie_1_ladestand') | float(0)
          %}
          {% set soc_2 =
            states('sensor.hem_batterie_2_ladestand') | float(0)
          %}
          {% set soc_min = [soc_1, soc_2] | min %}
          {% set einzelakku_minimum =
            states(
              'input_number.hem_controller_einzelakku_minimum'
            ) | float(10)
          %}

          {#
            Positive Sollleistung bedeutet Entladung.

            Erreicht mindestens ein Akkublock das eingestellte
            Einzelakku-Minimum, wird jede weitere Entladung gestoppt.

            Negative Sollleistung bedeutet Laden und bleibt weiterhin
            erlaubt, damit PV-Überschuss aufgenommen werden kann.
          #}
          {% if ungeregelt > 0 and soc_min <= einzelakku_minimum %}
            0
          {% elif ungeregelt > 0 %}
            {{
              [
                ungeregelt,
                schonend,
                maximum
              ] | min | round(0)
            }}
          {% else %}
            {{ ungeregelt | round(0) }}
          {% endif %}
        attributes:
          ungedrosselte_sollleistung: >
            {{
              states(
                'sensor.hem_ungedrosselte_sollleistung'
              )
            }}
          schonende_leistungsgrenze: >
            {{
              states(
                'sensor.hem_schonende_leistungsgrenze'
              )
            }}
          kleinster_einzelakku_soc: >
            {{
              [
                states('sensor.hem_batterie_1_ladestand') | float(0),
                states('sensor.hem_batterie_2_ladestand') | float(0)
              ] | min
            }}
          einzelakku_minimum: >
            {{
              states(
                'input_number.hem_controller_einzelakku_minimum'
              )
            }}
          einzelakku_entladestopp: >
            {{
              [
                states('sensor.hem_batterie_1_ladestand') | float(0),
                states('sensor.hem_batterie_2_ladestand') | float(0)
              ] | min
              <=
              states(
                'input_number.hem_controller_einzelakku_minimum'
              ) | float(10)
            }}
          vorzeichen: >
            positiv Entladung, negativ Ladung
          controller_aktiv: >
            {{
              is_state(
                'input_boolean.hem_controller_aktiv',
                'on'
              )
            }}
          manueller_betrieb: >
            {{
              is_state(
                'input_boolean.hem_manueller_betrieb',
                'on'
              )
            }}
          steuerung: >
            Nur Empfehlung – keine Ansteuerung des NEXA

      - name: "HEM Controller Begründung"
        unique_id: hem_controller_begrundung
        icon: mdi:text-box-search-outline
        state: >
          {% set daten_ok =
            is_state(
              'binary_sensor.hem_netzleistung_gultig',
              'on'
            )
            and is_state(
              'binary_sensor.hem_batteriedaten_gultig',
              'on'
            )
            and is_state(
              'binary_sensor.hem_temperaturen_gultig',
              'on'
            )
          %}
          {% set soc_1 =
            states('sensor.hem_batterie_1_ladestand') | float(0)
          %}
          {% set soc_2 =
            states('sensor.hem_batterie_2_ladestand') | float(0)
          %}
          {% set soc_min = [soc_1, soc_2] | min %}
          {% set minimum =
            states(
              'input_number.hem_controller_einzelakku_minimum'
            ) | float(10)
          %}
          {% set temperatur_max =
            [
              states('sensor.hem_batterie_1_temperatur')
                | float(0),
              states('sensor.hem_batterie_2_temperatur')
                | float(0)
            ] | max
          %}
          {% set temperatur_hart =
            states(
              'input_number.hem_controller_temperatur_maximum'
            ) | float(50)
          %}
          {% set soll =
            states('sensor.hem_speicher_sollleistung') | float(0)
          %}
          {% set ungeregelt =
            states('sensor.hem_ungedrosselte_sollleistung')
              | float(0)
          %}
          {% set schonend =
            states('sensor.hem_schonende_leistungsgrenze')
              | float(0)
          %}

          {% if not daten_ok %}
            Daten nicht vollständig
          {% elif soc_min <= minimum %}
            Einzelakku-Schutz
          {% elif temperatur_max >= temperatur_hart %}
            Temperatur-Schutz
          {% elif soll < ungeregelt and soll == schonend %}
            Batteriebedingte Drosselung
          {% elif soll < 0 %}
            Überschuss in Speicher laden
          {% elif soll == 0 %}
            Speicher inaktiv
          {% else %}
            Hausbedarf aus Speicher decken
          {% endif %}
        attributes:
          speicher_sollleistung: >
            {{ states('sensor.hem_speicher_sollleistung') }}
          netzleistung: >
            {{ states('sensor.hem_netzleistung') }}
          soc_differenz: >
            {{ states('sensor.hem_soc_differenz') }}
          temperaturdifferenz: >
            {{
              states(
                'sensor.hem_temperaturdifferenz'
              )
            }}
